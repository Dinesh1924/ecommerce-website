<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Invoice</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="receipt.css">
</head>
<body>

<div class="invoice-container">

 
  <div class="invoice-header">
    <div class="logo">
      <img src="src/pngwing.com (13).png" alt="Company Logo">
      <h2>SHE<span style="color: green;">.in</span></h2>
    </div>
    <div class="invoice-info">
      <p><strong>Invoice #:</strong> INV-20260226-01</p>
      <p><strong>Date:</strong> 26-Feb-2026</p>
      <p><strong>Payment Method:</strong> Gpay **** 9798</p>
    </div>
  </div>

  <hr>

  
  <div class="billing-info">
    <p><strong>Billed To:</strong> Janani</p>
    <p><strong>Email:</strong> jan.demo@example.com</p>
  </div>

  
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Saree</td>
        <td>1</td>
        <td>$599</td>
        <td>$599</td>
      </tr>
      <tr>
        <td>Baggy Jean Men</td>
        <td>1</td>
        <td>$999</td>
        <td>$999</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <th colspan="3">Subtotal</th>
        <td>$1598</td>
      </tr>
      <tr>
        <th colspan="3">Tax (5%)</th>
        <td>$79.9</td>
      </tr>
      <tr>
        <th colspan="3">Total</th>
        <td>$1677.9</td>
      </tr>
    </tfoot>
  </table>

 
  <div class="invoice-footer">
    <p>Thank you for shopping with ShopEasy!</p>
    <button onclick="window.print()"><i class="fa-solid fa-print"></i> Print / Download</button>
  </div>

</div>

</body>
</html>
